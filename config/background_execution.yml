# Background Execution Configuration
# 后台执行配置

# Reflection System Configuration
reflection:
  llm_thread_pool_size: 4        # LLM调用线程池大小
  max_concurrent_tasks: 10       # 最大并发任务数
  task_timeout_seconds: 300      # 任务超时时间（秒）
  retry_attempts: 3              # 重试次数
  retry_base_delay_seconds: 1    # 重试基础延迟（秒）

# Learning System Configuration
learning:
  sandbox_process_pool_size: 2   # 沙箱进程池大小
  sandbox_timeout_seconds: 300   # 沙箱超时时间（秒）
  sandbox_memory_limit_mb: 512   # 沙箱内存限制（MB）
  sandbox_cpu_limit: 1.0         # 沙箱CPU限制（核数）
  max_concurrent_tasks: 5        # 最大并发学习任务

# Queue Configuration
queue:
  priority_levels: 4             # 优先级层级数
  aging_interval_seconds: 60     # 老化检查间隔（秒）
  max_queue_size: 100            # 最大队列长度
  aging_threshold_seconds: 300   # 老化阈值（秒）

# Monitoring Configuration
monitoring:
  enabled: true                  # 是否启用监控
  metrics_retention_hours: 24    # 指标保留时间（小时）
  alert_on_failure: true         # 失败时告警
  health_check_interval_seconds: 30  # 健康检查间隔（秒）
