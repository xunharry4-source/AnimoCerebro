[pytest]
addopts = --import-mode=importlib
asyncio_mode = auto
pythonpath =
    src
    .
norecursedirs = .venv .zentex src/admin-portal/node_modules
markers =
    integration: requires a real local network/process environment rather than the sandboxed TestClient path
    slow: real acceptance test that is too slow for the default PR gate
    network: requires remote network access or a paid external provider
    live_llm: requires a live LLM provider call
    real_http_live: R2a real HTTP acceptance using live_http_server with a real socket
    real_http_client: R2b real HTTP acceptance using FastAPI TestClient
    external_boundary_mock: R4 external boundary mock with observable call assertions
    real_browser: R3 browser end-to-end acceptance
